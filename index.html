<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クマガイ | Profile</title>
<style>
  :root {
    --bg: #0d0f14;
    --card-bg: #161a22;
    --text-main: #eef1f6;
    --text-sub: #9aa4b2;
    --accent: #6ea8fe;
    --border: #262c38;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
      "Hiragino Sans", Meiryo, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    opacity: 0;
    transform: translateY(16px);
    animation: fadeInUp 0.8s ease forwards;
  }

  .avatar {
    width: 96px;
    height: 96px;
    margin: 0 auto 24px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.15s forwards;
  }

  .name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.3s forwards;
  }

  .bio {
    font-size: 14.5px;
    line-height: 1.8;
    color: var(--text-sub);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.45s forwards;
  }

  .skills {
    text-align: left;
    margin-bottom: 32px;
    opacity: 0;
  }

  .skills-title {
    animation: fadeIn 0.8s ease 0.6s forwards;
  }

  .skills-list {
    animation: fadeIn 0.8s ease 0.75s forwards;
  }

  .skills-heading {
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-sub);
    margin-bottom: 12px;
  }

  .skill-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .skill-item + .skill-item {
    margin-top: 8px;
  }

  .skill-icon {
    font-size: 20px;
    line-height: 1;
    flex-shrink: 0;
  }

  .skill-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .skill-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
  }

  .skill-level {
    font-size: 12px;
    color: var(--text-sub);
  }

  .links {
    display: flex;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.9s forwards;
  }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text-main);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.25s ease;
  }

  .link-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f14;
    transform: translateY(-2px);
  }

  .link-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 480px) {
    .card {
      padding: 36px 24px;
      border-radius: 16px;
    }
    .name {
      font-size: 22px;
    }
  }
</style>
</head>
<body>

  <div class="card">
    <img class="avatar" src="img_kumabiz.png" alt="クマガイ">
    <div class="name">クマガイ</div>
    <p class="bio">
      地方中小企業の人手不足を<br>
      テクノロジーで解決します。
    </p>
    <div class="skills skills-title">
      <div class="skills-heading">職種</div>
      <div class="skill-item">
        <span class="skill-icon">💼</span>
        <div class="skill-info">
          <span class="skill-name">AIコンサルタント</span>
        </div>
      </div>
    </div>
    <div class="skills skills-list">
      <div class="skills-heading">スキル</div>
      <div class="skill-item">
        <span class="skill-icon">✨</span>
        <div class="skill-info">
          <span class="skill-name">Claude Code</span>
          <span class="skill-level">実務レベルで活用中</span>
        </div>
      </div>
      <div class="skill-item">
        <span class="skill-icon">🤝</span>
        <div class="skill-info">
          <span class="skill-name">セールス</span>
          <span class="skill-level">不動産・IT・M&amp;A業界での営業経験あり</span>
        </div>
      </div>
    </div>
    <div class="links">
      <a class="link-btn" href="https://x.com/hitodeinc" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        X (Twitter)
      </a>
    </div>
  </div>

</body>
</html>
